<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Credencial Virtual</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body { 
            font-family: Arial, sans-serif; 
            text-align: center;
            padding: 50px; 
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .tarjeta { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            display: flex;
            /* display: inline-block;  */
            flex-direction: column;
            gap: 15px;
        }
        #codigo-qr { 
            margin-top: 20px; 
            display: flex; 
            justify-content: center; 
        }
        .error { 
            color: red; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <div class="tarjeta">
        <h2>Credencial Universitaria</h2>
        <p><strong>Personal:</strong> {{ user.first_name }} {{ user.last_name }}</p>
        <p><strong>Departamento:</strong> {{ personal.departamento }}</p>
        <hr>

        {% if credencial %}
            <p>Pasa este código por el escáner para entrar:</p>
            
            <div id="codigo-qr"></div>

            <script>
                var codigoSecreto = "{{ credencial.codigo_unico }}";

                new QRCode(document.getElementById("codigo-qr"), {
                    text: codigoSecreto,
                    width: 250,  
                    height: 250, 
                    colorDark : "#000000", 
                    colorLight : "#ffffff", 
                    correctLevel : QRCode.CorrectLevel.H
                });
            </script>
        {% else %}
            <p class="error">Aún no tienes una credencial activa. Pasa a Control Escolar.</p>
        {% endif %}

        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit">
                Cerrar Sesión
            </button>
        </form>
    </div>

</body>
</html>
