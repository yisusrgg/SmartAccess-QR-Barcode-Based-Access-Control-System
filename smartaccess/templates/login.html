{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Control de Acceso</title>
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 600px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            margin-bottom: 10px;
            color: #1e3c72;
        }
        .subtitle {
            margin-bottom: 30px;
            color: #555;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #1e3c72;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #2a5298;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bienvenido al Sistema de Control de Acceso</h1>
        <p class="subtitle">Por favor, inicie sesión para continuar</p>

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            {% if form.errors %}
                <p style="color: red; margin-bottom: 10px;">Usuario o contraseña incorrectos.</p>
            {% endif %}
            <div class="input-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Iniciar Sesión</button>
        </form>
    </div>

</body>
</html>
